name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths-ignore: ["**.md", "docs/**", "docs/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            community

      - name: Install Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: community
        run: |
          python3 -m pip install --upgrade pip
          pip install cryptography>=41.0.0 pytest>=8.0 pytest-cov>=5.0

      - name: Lint check
        working-directory: community
        run: |
          python3 -m py_compile tools/mcp_server.py
          python3 -m py_compile cli/receipt-verify.py

      - name: Run tests
        working-directory: community
        run: python3 -m pytest -v --tb=short --cov=tools --cov-report=term-missing

  docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: community
        run: docker build -t agentops-community -f Dockerfile ..

      - name: Smoke test (tools/list)
        working-directory: community
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}' \
            | docker run -i --rm agentops-community python3 tools/mcp_server.py \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'result' in d; tools=d['result']['tools']; print(f'{len(tools)} tools OK'); assert len(tools) >= 7"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Push to Docker Hub
        run: |
          docker tag agentops-community ${{ secrets.DOCKERHUB_USERNAME }}/sovereign-agentops:${{ steps.version.outputs.VERSION }}
          docker tag agentops-community ${{ secrets.DOCKERHUB_USERNAME }}/sovereign-agentops:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sovereign-agentops:${{ steps.version.outputs.VERSION }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sovereign-agentops:latest

      - name: Push to GHCR
        run: |
          docker tag agentops-community ghcr.io/${{ github.repository_owner }}/sovereign-agentops:${{ steps.version.outputs.VERSION }}
          docker tag agentops-community ghcr.io/${{ github.repository_owner }}/sovereign-agentops:latest
          docker push ghcr.io/${{ github.repository_owner }}/sovereign-agentops:${{ steps.version.outputs.VERSION }}
          docker push ghcr.io/${{ github.repository_owner }}/sovereign-agentops:latest

  publish-pypi:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Build package
        working-directory: community
        run: |
          python3 -m pip install --upgrade build
          python3 -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
