site_name: Autonomous Digital Organization Platform
site_description: Self-hosted, MCP-native governed operations layer for AI agents
repo_url: https://github.com/geludobre/sovereign-agentops
edit_uri: edit/main/community/docs/

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Community Edition: community.md
  - Configuration: configuration.md
  - Security Model: security-model.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/geludobre/sovereign-agentops
